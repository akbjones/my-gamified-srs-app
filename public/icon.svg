<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Atom orbits -->
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="none" stroke="white" stroke-width="4" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="120" ry="50" fill="none" stroke="white" stroke-width="4" opacity="0.35" transform="rotate(55 256 256)"/>
  <ellipse cx="256" cy="256" rx="120" ry="50" fill="none" stroke="white" stroke-width="4" opacity="0.35" transform="rotate(-55 256 256)"/>
  <!-- Nucleus -->
  <circle cx="256" cy="256" r="22" fill="white" opacity="0.9"/>
</svg>
